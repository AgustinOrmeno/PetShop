{% extends 'base.html' %}

{% block contenido %}

<div class="titulo-pagina">
    <i class="bi bi-cart3"></i> Nueva Venta
</div>

<form method="POST">

    <!-- Cliente -->
    <div class="card mb-3">
        <div class="card-body">
            <label class="form-label fw-bold">Cliente</label>
            <input type="text" name="cliente" class="form-control"
                   placeholder="Consumidor Final" style="max-width: 300px;">
        </div>
    </div>

    <!-- Items de la venta -->
    <div class="card mb-3">
        <div class="card-header bg-dark text-white">
            <i class="bi bi-list-ul"></i> Productos de la venta
        </div>
        <div class="card-body">

            <div id="items-container">
                <!-- Los items se agregan acá dinámicamente -->
            </div>

            <button type="button" class="btn btn-outline-primary mt-2" onclick="agregarItem()">
                <i class="bi bi-plus-circle"></i> Agregar producto
            </button>
        </div>
    </div>

    <!-- Total -->
    <div class="card mb-3">
        <div class="card-body d-flex justify-content-between align-items-center">
            <span class="fs-5 fw-bold">Total</span>
            <span class="fs-4 fw-bold text-primary">$ <span id="total">0.00</span></span>
        </div>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success btn-lg">
            <i class="bi bi-check-circle"></i> Confirmar Venta
        </button>
        <a href="/" class="btn btn-outline-secondary btn-lg">Cancelar</a>
    </div>

</form>

<!-- Template de un item (oculto, se clona con JS) -->
<template id="item-template">
    <div class="item-venta border rounded p-3 mb-2">
        <div class="row g-2 align-items-end">

            <div class="col-md-4">
                <label class="form-label fw-bold">Producto</label>
                <select name="producto_id[]" class="form-select select-producto" onchange="actualizarPrecio(this)">
                    <option value="">-- Seleccioná --</option>
                    {% for p in productos %}
                    <option value="{{ p.id }}"
                            data-precio-kg="{{ p.precio_kg }}"
                            data-precio-bolson="{{ p.precio_bolson }}"
                            data-peso-bolson="{{ p.peso_bolson_kg }}"
                            data-stock="{{ p.stock_kg }}">
                        {{ p.nombre }} ({{ p.stock_kg }} kg en stock)
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label fw-bold">Tipo de venta</label>
                <select name="tipo_venta[]" class="form-select select-tipo" onchange="actualizarPrecio(this)">
                    <option value="kg">Por kg</option>
                    <option value="bolson">Bolsón entero</option>
                </select>
            </div>

            <div class="col-md-2">
                <label class="form-label fw-bold">Cantidad</label>
                <input type="number" name="cantidad[]" class="form-control input-cantidad"
                       step="0.1" min="0.1" value="1" oninput="validarStock(this)" onchange="validarStock(this)">
                <div class="invalid-feedback">Stock insuficiente</div>
            </div>

            <div class="col-md-2">
                <label class="form-label fw-bold">Precio unit.</label>
                <div class="form-control bg-light precio-unitario">$ 0.00</div>
            </div>

            <div class="col-md-1">
                <button type="button" class="btn btn-outline-danger w-100" onclick="eliminarItem(this)">
                    <i class="bi bi-trash"></i>
                </button>
            </div>

        </div>
    </div>
</template>

<script>
    function agregarItem() {
        const template = document.getElementById('item-template');
        const clone = template.content.cloneNode(true);
        document.getElementById('items-container').appendChild(clone);
        calcularTotal();
    }

    function eliminarItem(btn) {
        btn.closest('.item-venta').remove();
        calcularTotal();
    }

    function actualizarPrecio(el) {
        const item = el.closest('.item-venta');
        const select = item.querySelector('.select-producto');
        const tipo = item.querySelector('.select-tipo').value;
        const option = select.options[select.selectedIndex];

        if (!option.value) return;

        const precio = tipo === 'kg'
            ? parseFloat(option.dataset.precioKg)
            : parseFloat(option.dataset.precioBolson);

        const inputCantidad = item.querySelector('.input-cantidad');
        if (tipo === 'bolson') {
            inputCantidad.step = '1';
            inputCantidad.min = '1';
            inputCantidad.readOnly = false;
        } else {
            inputCantidad.step = '0.1';
            inputCantidad.min = '0.1';
            inputCantidad.readOnly = false;
        }

        item.querySelector('.precio-unitario').textContent = '$ ' + precio.toFixed(2);
        calcularTotal();
    }

    function validarStock(inputCantidad) {
        const item = inputCantidad.closest('.item-venta');
        const select = item.querySelector('.select-producto');
        const tipo = item.querySelector('.select-tipo').value;
        const option = select.options[select.selectedIndex];

        if (!option || !option.value) return;

        const stockDisponible = parseFloat(option.dataset.stock);
        const cantidad = parseFloat(inputCantidad.value) || 0;
        const pesoBolson = parseFloat(option.dataset.pesoBolson) || 0;
        const kgNecesarios = tipo === 'kg' ? cantidad : pesoBolson * cantidad;

        if (kgNecesarios > stockDisponible) {
            inputCantidad.classList.add('is-invalid');
        } else {
            inputCantidad.classList.remove('is-invalid');
        }
        calcularTotal();
    }

    function calcularTotal() {
        let total = 0;
        document.querySelectorAll('.item-venta').forEach(item => {
            const select = item.querySelector('.select-producto');
            const tipo = item.querySelector('.select-tipo').value;
            const cantidad = parseFloat(item.querySelector('.input-cantidad').value) || 0;
            const option = select.options[select.selectedIndex];

            if (!option || !option.value) return;

            const precio = tipo === 'kg'
                ? parseFloat(option.dataset.precioKg)
                : parseFloat(option.dataset.precioBolson);

            total += precio * cantidad;
            item.querySelector('.precio-unitario').textContent = '$ ' + precio.toFixed(2);
        });

        document.getElementById('total').textContent = total.toFixed(2);
    }

    // Agregar el primer item automáticamente
    agregarItem();
</script>

{% endblock %}
