<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Licencia vencida - PetShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="min-height:100vh">
<div class="card text-center shadow-lg" style="max-width:450px; width:100%">
    <div class="card-body p-5">
        <i class="bi bi-lock-fill text-danger" style="font-size:4rem"></i>
        <h3 class="mt-3 fw-bold">Licencia vencida</h3>
        <p class="text-muted">El período de prueba de 30 días ha finalizado.</p>
        <p class="text-muted mb-4">Para continuar usando el sistema ingresá tu clave de activación.</p>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/activar">
            <div class="mb-3">
                <input type="text" name="clave" class="form-control form-control-lg text-center"
                       placeholder="XXXXXXXX" maxlength="8" style="letter-spacing:5px; font-weight:bold"
                       required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">
                <i class="bi bi-unlock"></i> Activar
            </button>
        </form>

        <hr class="mt-4">
        <small class="text-muted">
            Código de instalación: <strong>{{ fecha_instalacion }}</strong><br>
            Contactá a tu proveedor para obtener la clave.
        </small>
    </div>
</div>
</body>
</html>
